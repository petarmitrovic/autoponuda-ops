name: Deploy monitoring stack

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Ansible deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and Docker SDK
        run: pip install ansible docker

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible-requirements.yml

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Verify SSH key
        run: ssh-keygen -l -f ~/.ssh/id_ed25519

      - name: Write vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass.ci
        # .vault_pass.ci is never committed — it lives only in the runner's workspace

      - name: Run monitoring playbook
        run: >
          ansible-playbook playbooks/setup_monitoring.yml
          --vault-password-file .vault_pass.ci

      - name: Clean up vault password file
        if: always()
        run: rm -f .vault_pass.ci
