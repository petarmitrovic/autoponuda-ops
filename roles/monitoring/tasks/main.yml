---
- name: Create monitoring directory
  ansible.builtin.file:
    path: "{{ monitoring_dir }}"
    state: directory
    mode: "0750"

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_dir }}/docker-compose.yml"
    mode: "0640"
  notify: Restart monitoring stack

- name: Create Grafana provisioning directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - "{{ monitoring_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_dir }}/grafana/dashboards"

- name: Template Grafana datasources provisioning
  ansible.builtin.template:
    src: grafana-datasources.yml.j2
    dest: "{{ monitoring_dir }}/grafana/provisioning/datasources/prometheus.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Template Grafana dashboard provisioning config
  ansible.builtin.template:
    src: grafana-dashboard-provisioning.yml.j2
    dest: "{{ monitoring_dir }}/grafana/provisioning/dashboards/default.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Copy dashboards
  ansible.builtin.copy:
    src: dashboards/
    dest: "{{ monitoring_dir }}/grafana/dashboards/"
    mode: "0644"
  notify: Restart monitoring stack

- name: Template prometheus.yml
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_dir }}/prometheus.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Pull images and start monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_dir }}"
    state: present
    pull: always
